[package]
name = "kreuzberg_nif"
version = "5.0.0-rc.16"
edition = "2024"
license = "Elastic-2.0"
description = "High-performance document intelligence library"
readme = false
keywords = ["document", "extraction", "ocr", "pdf", "text"]
categories = []

[package.metadata.cargo-machete]
ignored = ["tokio", "async-trait", "alloc-no-stdlib", "alloc-stdlib", "brotli-decompressor"]

[workspace]

[lib]
name = "kreuzberg_nif"

crate-type = ["cdylib"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(feature, values("api", "api-types", "auto-rotate-types", "captioning", "chunking-tokenizers", "classification", "diff", "embedding-presets", "embeddings", "heic", "html", "keywords-rake", "keywords-yake", "layout-types", "liter-llm", "ner-llm", "ner-onnx", "ocr", "ocr-wasm", "office", "paddle-ocr-types", "pdf", "quality", "redaction", "reranker", "reranker-presets", "svg", "tokio-runtime", "transcription-types", "tree-sitter", "xml"))'] }

[dependencies]
alloc-no-stdlib = "=2.0.4"
alloc-stdlib = "=0.2.2"
async-trait = "0.1"
brotli-decompressor = "=5.0.1"
kreuzberg = { version = "5.0.0-rc.16", path = "../../../../crates/kreuzberg", features = ["full", "pdf", "ocr", "paddle-ocr", "paddle-ocr-types", "layout-detection", "layout-types", "embeddings", "embedding-presets", "reranker", "reranker-presets", "chunking", "keywords-yake", "keywords-rake", "language-detection", "html", "tree-sitter", "office", "email", "archives", "stopwords", "auto-rotate", "auto-rotate-types", "tokio-runtime", "api", "mcp", "liter-llm", "quality"] }
rustler = "0.38"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }
