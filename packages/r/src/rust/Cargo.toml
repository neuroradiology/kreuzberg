[package]
name = "kreuzberg-r"
version = "5.0.0-rc.5"
edition = "2024"
license = "Elastic-2.0"
description = "High-performance document intelligence library"
readme = false
keywords = ["document", "extraction", "ocr", "pdf", "text"]
categories = []

[lib]
crate-type = ["staticlib", "lib"]

[dependencies]
async-trait = "0.1"
extendr-api = "0.9"
kreuzberg = { version = "5.0.0-rc.5", path = "../../../../crates/kreuzberg", features = ["no-ort-target", "api", "mcp"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread"] }
