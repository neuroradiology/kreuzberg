name: Publish Helm Chart

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g., v1.0.0-rc.24)"
        required: true
        type: string
      dry_run:
        description: "Prepare artifacts without publishing"
        required: false
        type: boolean
        default: false
  release:
    types: [published]
  repository_dispatch:
    types: [publish-helm]

concurrency:
  group: ${{ github.workflow }}-${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.tag) || github.ref || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish-helm:
    name: Publish Helm chart to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required for cosign keyless signing (Sigstore OIDC token).
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            TAG="${{ github.event.client_payload.tag }}"
          fi

          VERSION="${TAG#v}"
          DRY_RUN="${{ inputs.dry_run || 'false' }}"

          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "dry_run=${DRY_RUN}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Helm Publish Metadata"
            echo "- **Tag**: \`${TAG}\`"
            echo "- **Version**: \`${VERSION}\`"
            echo "- **Dry Run**: \`${DRY_RUN}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Helm
        uses: azure/setup-helm@v5

      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin kubeconform

      - name: Lint chart
        run: |
          helm lint --strict charts/xberg/
          helm template charts/xberg/ | kubeconform -strict -summary -

      - name: Publish chart
        uses: xberg-io/actions/publish-helm-chart@v1
        with:
          chart-path: charts/xberg
          version: ${{ steps.meta.outputs.version }}
          registry: oci://ghcr.io/xberg-io/charts
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          dry-run: ${{ steps.meta.outputs.dry_run }}

      - name: Install cosign
        if: steps.meta.outputs.dry_run != 'true'
        uses: sigstore/cosign-installer@v3

      - name: Install oras
        if: steps.meta.outputs.dry_run != 'true'
        uses: oras-project/setup-oras@v1

      - name: Registry login
        if: steps.meta.outputs.dry_run != 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      # Sign the pushed chart with cosign keyless (Sigstore OIDC + Rekor) so
      # Artifact Hub shows the "Signed" label. Signing by digest, not tag.
      - name: Sign chart (cosign keyless)
        if: steps.meta.outputs.dry_run != 'true'
        env:
          COSIGN_YES: "true"
        run: |
          DIGEST="$(oras manifest fetch --descriptor \
            ghcr.io/xberg-io/charts/xberg:${{ steps.meta.outputs.version }} | jq -r .digest)"
          echo "Signing ghcr.io/xberg-io/charts/xberg@${DIGEST}"
          cosign sign "ghcr.io/xberg-io/charts/xberg@${DIGEST}"

      # Push the Artifact Hub repository metadata so the repository is marked as
      # a Verified Publisher. Idempotent — re-pushing overwrites the same tag.
      - name: Publish Artifact Hub repository metadata
        if: steps.meta.outputs.dry_run != 'true'
        run: |
          oras push \
            ghcr.io/xberg-io/charts/xberg:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml
